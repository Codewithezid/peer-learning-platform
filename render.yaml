services:
  - type: web
    name: peer-connect-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: ADMIN_USER_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_SERVICE_TIMEOUT_MS
        value: 8000
      - key: SUPABASE_AVATAR_BUCKET
        value: avatars
      - key: SUPABASE_RESOURCE_BUCKET
        value: resource-files

  - type: web
    name: peer-connect-ai
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - ai-service/**
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
